# docker-compose.yml — local development stack
# Brings up: postgres + the app (with hot reload) + nginx in front.
# Use docker-compose.prod.yml for production overrides.

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: campuspulse_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-campuspulse}
      POSTGRES_USER:     ${POSTGRES_USER:-campuspulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Expose to host for local tooling (TablePlus, psql, etc.)
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-campuspulse} -d ${POSTGRES_DB:-campuspulse}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  # ── Application ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      target: builder      # Use the build stage — source is mounted for hot reload
    container_name: campuspulse_app
    restart: unless-stopped
    command: pnpm dev       # Override entrypoint for hot reload in dev
    env_file: .env
    environment:
      NODE_ENV:     development
      DATABASE_URL: postgresql://${POSTGRES_USER:-campuspulse}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-campuspulse}
    volumes:
      # Mount source so nest --watch picks up changes without rebuilding
      - ./src:/app/src:ro
      # Preserve node_modules from the image — don't shadow with host
      - /app/node_modules
    ports:
      # Expose directly for debugging without going through nginx
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - internal

  # ── Nginx ───────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: campuspulse_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal
      - external

volumes:
  postgres_data:
    name: campuspulse_postgres_data

networks:
  # Internal network — postgres and app communicate here, never exposed
  internal:
    driver: bridge
    internal: true
  # External network — only nginx is attached, handles all public traffic
  external:
    driver: bridge
