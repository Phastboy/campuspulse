# nginx/nginx.conf
# Reverse proxy configuration for CampusPulse API.
# Sits in front of the NestJS app, handling:
#   - Rate limiting (global + per-endpoint)
#   - Gzip compression
#   - Security headers
#   - Upstream health and keep-alive

# Number of worker processes — auto matches CPU core count
worker_processes auto;

# Cap open file descriptors per worker
worker_rlimit_nofile 65535;

events {
  worker_connections 1024;
  multi_accept on;
  use epoll;
}

http {
  # ── Mime types ─────────────────────────────────────────────────────────────
  include      /etc/nginx/mime.types;
  default_type application/json;

  # ── Logging ────────────────────────────────────────────────────────────────
  log_format json_combined escape=json
    '{'
      '"time":"$time_iso8601",'
      '"remote_addr":"$remote_addr",'
      '"method":"$request_method",'
      '"uri":"$request_uri",'
      '"status":$status,'
      '"bytes":$body_bytes_sent,'
      '"referrer":"$http_referer",'
      '"user_agent":"$http_user_agent",'
      '"request_time":$request_time,'
      '"upstream_time":"$upstream_response_time"'
    '}';

  access_log /var/log/nginx/access.log json_combined;
  error_log  /var/log/nginx/error.log  warn;

  # ── Performance ────────────────────────────────────────────────────────────
  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  65;
  types_hash_max_size 2048;

  # ── Gzip ───────────────────────────────────────────────────────────────────
  gzip              on;
  gzip_vary         on;
  gzip_proxied      any;
  gzip_comp_level   6;
  gzip_min_length   1024;
  gzip_types
    application/json
    application/javascript
    text/plain
    text/css;

  # ── Rate limiting zones ────────────────────────────────────────────────────
  # Global zone: 60 req/min per IP across all endpoints
  limit_req_zone $binary_remote_addr zone=global:10m rate=60r/m;

  # Ingestion zone: 10 submissions/min per IP — scoring is expensive
  limit_req_zone $binary_remote_addr zone=ingestion:10m rate=10r/m;

  # Return 429 Too Many Requests instead of nginx's default 503
  limit_req_status 429;

  # ── Hide nginx version from error pages and headers ────────────────────────
  server_tokens off;

  # ── Upstream ───────────────────────────────────────────────────────────────
  upstream campuspulse_app {
    server app:3000;

    # Keep persistent connections to the app — avoids TCP handshake per request
    keepalive 32;
  }

  # ── Server block ───────────────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    # Apply global rate limit — burst of 20 allows short spikes without queuing
    limit_req zone=global burst=20 nodelay;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-Frame-Options         "DENY"            always;
    add_header X-XSS-Protection        "1; mode=block"   always;
    add_header Referrer-Policy         "no-referrer"     always;
    add_header Permissions-Policy      "geolocation=()"  always;

    # ── Client limits ────────────────────────────────────────────────────────
    client_max_body_size    1m;
    client_body_timeout     10s;
    client_header_timeout   10s;

    # ── Ingestion endpoints — stricter rate limit ─────────────────────────
    location /api/ingestion/ {
      limit_req zone=ingestion burst=5 nodelay;

      proxy_pass         http://campuspulse_app;
      proxy_http_version 1.1;

      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection        "";

      proxy_read_timeout  30s;
      proxy_send_timeout  10s;
      proxy_connect_timeout 5s;
    }

    # ── All other API routes ──────────────────────────────────────────────
    location /api/ {
      proxy_pass         http://campuspulse_app;
      proxy_http_version 1.1;

      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection        "";

      proxy_read_timeout  15s;
      proxy_send_timeout  10s;
      proxy_connect_timeout 5s;
    }

    # ── Block all non-API traffic ─────────────────────────────────────────
    location / {
      return 404 '{"statusCode":404,"message":"Not found"}';
      add_header Content-Type application/json always;
    }

    # ── Nginx status endpoint (internal only) ─────────────────────────────
    location /nginx-health {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain always;
    }
  }
}
