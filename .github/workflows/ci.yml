# .github/workflows/ci.yml
# CI pipeline — runs on every pull request targeting main.
#
# Job sequence:
#   check        — type-check + lint (fast feedback)
#     └── arch   — regenerate architecture docs and fail if they drift
#         └── docker-build — verify the production Docker image builds

name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Type-check and lint ─────────────────────────────────────────────────────
  check:
    name: Type-check & lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm exec tsc --noEmit --project tsconfig.build.json

      - name: Lint
        run: pnpm lint


  # ── Architecture docs ───────────────────────────────────────────────────────
  arch:
    name: Architecture docs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Regenerate docs
        # The script itself always succeeds; the diff check below catches drift
        run: node scripts/generate-arch.mjs

      - name: Fail if docs are out of date
        # If generate-arch.mjs was not re-run after a structural change,
        # this step fails the PR so the author knows to commit the updated file.
        run: |
          if ! git diff --quiet docs/architecture.md; then
            echo ""
            echo "❌  docs/architecture.md is out of date."
            echo "    Run  pnpm arch  and commit the updated file."
            echo ""
            git diff docs/architecture.md
            exit 1
          fi
          echo "✓  docs/architecture.md is up to date."


  # ── Docker image build ──────────────────────────────────────────────────────
  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: arch

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: false
          tags: campuspulse:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          build-args: |
            NODE_ENV=production
